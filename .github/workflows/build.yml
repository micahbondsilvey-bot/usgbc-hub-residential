name: Build

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']
  workflow_dispatch:

jobs:
  backend:
    name: Backend (NestJS) build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: usgbc-hub-residential-be
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Compile (nest build)
        run: npm run build

  frontend:
    name: Frontend (Angular) build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: usgbc-hub-residential-fe
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Build (ng build)
        run: npm run build
