services:
  postgres:
    image: postgres:15-alpine
    container_name: usgbc-hub-residential-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: usgbc
      POSTGRES_PASSWORD: usgbc
      POSTGRES_DB: usgbc_hub_residential
    ports:
      - '5433:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U usgbc -d usgbc_hub_residential']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: usgbc-hub-residential-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
